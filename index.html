<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Anísio Teixeira - Horários 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand-teal: #2dd4bf;
            --brand-orange: #fb923c;
            --bg-dark: #020617;
            --card-dark: #0f172a;
        }
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: linear-gradient(180deg, #020617 0%, #0f172a 100%);
            color: #f8fafc;
            min-height: 100vh;
            -webkit-tap-highlight-color: transparent;
        }
        .glass-panel {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
        }
        .active-pulse {
            position: relative;
            background: linear-gradient(90deg, rgba(45, 212, 191, 0.15), rgba(45, 212, 191, 0.05)) !important;
            border: 1px solid var(--brand-teal) !important;
            box-shadow: 0 0 20px rgba(45, 212, 191, 0.2);
            z-index: 10;
        }
        .active-pulse::after {
            content: '';
            position: absolute;
            left: 0; top: 0; bottom: 0;
            width: 4px;
            background: var(--brand-teal);
            border-radius: 20px 0 0 20px;
        }
        @keyframes pulse-ring {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(1.08); opacity: 0; }
        }
        .day-tab-active {
            background: #ffffff;
            color: #020617;
            font-weight: 800;
            transform: scale(1.05);
        }
        .view-toggle-active {
            background: rgba(255, 255, 255, 0.1);
            color: #ffffff;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .editable-cell {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .editable-cell:active {
            transform: scale(0.98);
            background: rgba(255,255,255,0.05);
        }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        
        #loadingOverlay {
            background: #020617;
        }
        
        /* Ajuste de legibilidade para o Select */
        #initialTeacherSelect {
            background-color: #0f172a;
            color: white;
            border: 2px solid rgba(255, 255, 255, 0.1);
            text-align-last: center;
        }
        #initialTeacherSelect option {
            background-color: #0f172a;
            color: white;
            padding: 10px;
        }
    </style>
</head>
<body class="antialiased">

    <div id="loadingOverlay" class="fixed inset-0 z-[100] flex flex-col items-center justify-center transition-opacity duration-700">
        <div class="relative flex items-center justify-center">

            <div class="absolute text-[10px] font-black text-teal-400 animate-pulse uppercase tracking-widest">AT</div>
        </div>
        <p class="mt-6 text-[10px] font-bold text-slate-500 uppercase tracking-[0.4em]">Nelton Systems • 2026</p>
    </div>

                    </label>
                </div>

                </p>
            </div>
        </div>

            "Nielsen": {mon:["PLAN (D)","PLAN (D)","PLAN (D)","PLAN (D)","FOLGA","2º C","2º C","PROJ. COMPL.","PLAN"],tue:["2º C","2º C","2º A","1º PAV","1º PAV","2º B","2º B","PLAN","1º A"],wed:["PLAN","PLAN","PLAN","PLAN","PLAN","2º C","2º C","2º A","2º A"],thu:["2º A","1º A","1º ADM","2º B","2º B","FOLGA","FOLGA","FOLGA","FOLGA"],fri:["1º A","1º A","1º ADM","PLAN","PLAN","2º B","2º B","2º C","2º C"]},
            "Rafaela": {mon:["FOLGA","FOLGA","FOLGA","FOLGA","FOLGA","1º PAV","LEI","LEI","LEI"],tue:["FOLGA","FOLGA","FOLGA","FOLGA","FOLGA","LEI","LEI","LEI","LEI"],wed:["FOLGA","FOLGA","FOLGA","FOLGA","FOLGA","1º PAV","1º PAV","LEI","LEI"],thu:["FOLGA","FOLGA","FOLGA","FOLGA","FOLGA","LEI","LEI","LEI","LEI"],fri:["FOLGA","FOLGA","FOLGA","FOLGA","FOLGA","LEI","LEI","LEI","LEI"]},
            "Roberto Andrade": {mon:["FOLGA","FOLGA","FOLGA","FOLGA","FOLGA","PLAN","3º B","3º C","2º A"],tue:["2º A","PLAN","2º B","PROJ. COMPL.","PLAN","3º C","3º C","3º B","3º B"],wed:["2º A","2º A","2º C","2º C","2º B","PLAN (D)","PLAN (D)","PLAN (D)","PLAN (D)"],thu:["PLAN","PLAN","PLAN","PLAN","PLAN","2º B","2º B","3º A","3º A"],fri:["3º B","PLAN","3º C","2º B","2º B","3º A","3º A","2º A","2º A"]},
            "Sâmia": {mon:["FOLGA","3º C","3º C","2º B","2º B","FOLGA","FOLGA","FOLGA","FOLGA"],tue:["PLAN","PLAN","PLAN","PLAN","PLAN","3º B","2º C","2º B","PLAN"],wed:["3º B","DT","DT","DT","3º C","PLAN (D)","PLAN (D)","PLAN (D)","PLAN (D)"],thu:["2º C","PLAN","3º C","3º C","PLAN","PROJ. COMPL.","PROJ. COMPL.", "3º B","3º B"],fri:["3º C","3º C","2º B","2º C","2º C","3º C","PLAN","3º A","3º A"]},
            "Soraia": {mon:["FOLGA","PLAN","2º A","3º C","3º C","FOLGA","FOLGA","FOLGA","FOLGA"],tue:["PLAN","PLAN","PLAN","PLAN","PLAN","3º A","3º B","PLAN","2º C"],wed:["2º B","DT","DT","3º A","3º A","PLAN (D)","PLAN (D)","PLAN (D)","PLAN (D)"],thu:["3º B","3º B","2º A","PLAN","3º A","PLAN","PLAN","2º B","2º C"],fri:["DT","PROJ. COMPL.","3º A","3º A","2º A","2º C","2º C","3º B","3º B"]},
            "Thiago": {mon:["-","-","-","-","-","-","-","-","-"],tue:["-","-","-","-","-","-","-","-","-"],wed:["DT","DT","2º A","2º A","DT","3º B","3º B","3º C","3º C"],thu:["FOLGA","FOLGA","PLAN","PLAN","2º A","PLAN","FOLGA","FOLGA","FOLGA"],fri:["-","-","-","-","-","-","-","-","-"]},
            "Vanessa ESP": {mon:["3º C","PLAN","3º B","FOLGA","FOLGA","FOLGA","FOLGA","FOLGA","FOLGA"],tue:["PCA","PCA","PCA","PCA","PCA","PCA","PCA","PCA","PLAN"],wed:["PLAN (D)","PLAN (D)","PLAN (D)","PLAN (D)","FOLGA","2º B","PLAN","3º A","3º A"],thu:["1º A","2º A","3º B","PLAN","2º C","PCA","PCA","3º C","PLAN"],fri:["1º ADM","PLAN","1º PAV","PLAN","FOLGA","FOLGA","FOLGA","FOLGA","FOLGA"]},
            "Vanessa Lima": {mon:["1º PAV","1º PAV","3º A","3º A","PLAN","FOLGA","FOLGA","FOLGA","FOLGA"],tue:["PLAN","PLAN","PLAN","PLAN","PLAN","FOLGA","FOLGA","FOLGA","FOLGA"],wed:["1º PAV","DT","DT","DT","1º PAV","FOLGA","FOLGA","FOLGA","FOLGA"],thu:["1º PAV","1º PAV","PLAN","1º ADM","PROJ. COMPL.","FOLGA","FOLGA","FOLGA","FOLGA"],fri:["-","-","-","-","-","-","-","-","-"]}
        };

        const dayKeys = ['mon', 'tue', 'wed', 'thu', 'fri'];
        const dayNames = { mon: 'Segunda', tue: 'Terça', wed: 'Quarta', thu: 'Quinta', fri: 'Sexta' };
        
        // HORÁRIOS: 1ª Aula às 07:10 | 6ª Aula às 13:00
        // Intervalos: 09:40-10:00 | 14:40-15:00
        const timeSlots = ["07:10", "08:00", "08:50", "10:00", "10:50", "13:00", "13:50", "15:00", "15:50"];
        
        let scheduleData = {};
        let viewMode = 'daily';
        let selectedDay = 'mon';
        let currentUser = null;
        let editingTarget = null;
        let db, auth, user, appId;

        // Initialize Firebase
        const fApp = initializeApp(firebaseConfig);
        auth = getAuth(fApp);
        db = getFirestore(fApp);
        appId = 'gestao-anisio';

        // Helpers
        const parseCell = (val) => {
            if (!val || val === "-") return { room: "-", sub: "" };
            const parts = val.split(" | ");
            return { room: parts[0] || "-", sub: parts[1] || "" };
        };

        const getTodayKey = () => ['sun', 'mon', 'tue', 'wed', 'thu', 'fri', 'sat'][new Date().getDay()];

        const checkTimeSlot = (idx) => {
            const now = new Date();
            const m = now.getHours() * 60 + now.getMinutes();
            const activeSlots = [
                [430, 480], // 07:10 - 08:00 (1ª)
                [480, 530], // 08:00 - 08:50 (2ª)
                [530, 580], // 08:50 - 09:40 (3ª)
                [600, 650], // 10:00 - 10:50 (4ª)
                [650, 700], // 10:50 - 11:40 (5ª)
                [780, 830], // 13:00 - 13:50 (6ª)
                [830, 880], // 13:50 - 14:40 (7ª)
                [900, 950], // 15:00 - 15:50 (8ª)
                [950, 1000] // 15:50 - 16:40 (9ª)
            ];
            return m >= activeSlots[idx][0] && m < activeSlots[idx][1];
        };

        const getCellMeta = (val) => {
            const room = parseCell(val).room;
            if (!val || val === "-" || room === "FOLGA") return { bg: 'bg-slate-800/20', text: 'text-slate-600', sub: 'Tempo Livre' };
            if (val.includes("PLAN")) return { bg: 'bg-teal-500/5', text: 'text-teal-400', sub: 'Planeamento' };
            if (val.includes("DT") || val.includes("PCA") || val.includes("PROJ") || val.includes("LEI") || val.includes("LEC")) return { bg: 'bg-orange-500/5', text: 'text-orange-400', sub: 'Especial' };
            return { bg: 'bg-blue-500/5', text: 'text-blue-400', sub: 'Aula Presencial' };
        };

        // Firebase Auth & Sync
        async function init() {
            startClock();
            const d = new Date().getDay();
            selectedDay = dayKeys[d-1] || 'mon';

            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    try { await signInWithCustomToken(auth, __initial_auth_token); } 
                    catch (e) { await signInAnonymously(auth); }
                } else {
                    await signInAnonymously(auth);
                }
            } catch (err) {
                console.error("Auth", err);
            }

            onAuthStateChanged(auth, async (authenticatedUser) => {
                if (!authenticatedUser) return;
                user = authenticatedUser;
                const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'schedules', 'mainData');
                
                onSnapshot(docRef, (docSnap) => {
                    if (docSnap.exists()) {
                        scheduleData = docSnap.data().content;
                    } else {
                        scheduleData = JSON.parse(JSON.stringify(baseScheduleData));
                        saveToFirebase(scheduleData);
                    }
                    
                    const loader = document.getElementById('loadingOverlay');
                    if(loader) {
                        loader.classList.add('opacity-0');
                        setTimeout(() => loader.classList.add('hidden'), 700);
                    }
                    
                    populateSelect();
                    checkPersistence();
                    if (currentUser) refreshUI();
                }, (error) => {
                    console.error("Sync Error", error);
                    scheduleData = JSON.parse(JSON.stringify(baseScheduleData));
                    if(document.getElementById('loadingOverlay')) document.getElementById('loadingOverlay').classList.add('hidden');
                    populateSelect();
                });
            });
        }

        async function saveToFirebase(data) {
            if (!user) return;
            const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'schedules', 'mainData');
            await setDoc(docRef, { content: data });
        }

        function checkPersistence() {
            const saved = localStorage.getItem('eemti_horario_v8_val');
            if (saved && scheduleData[saved]) {
                currentUser = saved;
                const selScreen = document.getElementById('selectionScreen');
                const mainApp = document.getElementById('app');
                if(selScreen) selScreen.classList.add('hidden');
                if(mainApp) mainApp.classList.remove('hidden');
                const display = document.getElementById('currentTeacherDisplay');
                if(display) display.textContent = "Olá, " + currentUser;
            }
        }

        window.confirmInitialSelection = function() {
            const val = document.getElementById('initialTeacherSelect').value;
            if (!val) return;
            currentUser = val;
            if (document.getElementById('stayConnected').checked) {
                localStorage.setItem('eemti_horario_v8_val', val);
            }
            document.getElementById('selectionScreen').classList.add('hidden');
            document.getElementById('app').classList.remove('hidden');
            const display = document.getElementById('currentTeacherDisplay');
            if(display) display.textContent = "Olá, " + currentUser;
            refreshUI();
        };

        window.logout = function() {
            localStorage.removeItem('eemti_horario_v8_val');
            location.reload();
        };

        window.openEditModal = function(day, index) {
            editingTarget = { day, index };
            const currentVal = scheduleData[currentUser][day][index];
            const data = parseCell(currentVal);
            
            document.getElementById('modalTitle').textContent = `${dayNames[day]} • ${index+1}ª Aula`;
            document.getElementById('editClassInput').value = data.room === "-" ? "" : data.room;
            document.getElementById('editSubjectInput').value = data.sub;
            
            document.getElementById('editModal').classList.remove('hidden');
            document.getElementById('editClassInput').focus();
        };

        window.closeModal = function() {
            document.getElementById('editModal').classList.add('hidden');
            editingTarget = null;
        };

        window.saveCellEdit = async function() {
            if (!editingTarget) return;
            const room = document.getElementById('editClassInput').value.trim() || "-";
            const sub = document.getElementById('editSubjectInput').value.trim();
            const btn = document.getElementById('saveBtn');
            btn.disabled = true;
            btn.textContent = "...";

            try {
                scheduleData[currentUser][editingTarget.day][editingTarget.index] = sub ? `${room} | ${sub}` : room;
                await saveToFirebase(scheduleData);
                refreshUI();
                closeModal();
            } catch (e) {
                alert("Falha ao salvar");
            } finally {
                btn.disabled = false;
                btn.textContent = "Salvar Alterações";
            }
        };

        window.changeViewMode = function(mode) {
            viewMode = mode;
            const dailyBtn = document.getElementById('btnViewDaily');
            const weeklyBtn = document.getElementById('btnViewWeekly');
            if(dailyBtn) dailyBtn.className = mode === 'daily' ? 'flex-1 py-3 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all view-toggle-active shadow-sm' : 'flex-1 py-3 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all text-slate-600';
            if(weeklyBtn) weeklyBtn.className = mode === 'weekly' ? 'flex-1 py-3 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all view-toggle-active shadow-sm' : 'flex-1 py-3 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all text-slate-600';
            
            const daySel = document.getElementById('daySelector');
            const weekHead = document.getElementById('weeklyEditHeader');
            if(daySel) daySel.classList.toggle('hidden', mode === 'weekly');
            if(weekHead) weekHead.classList.toggle('hidden', mode === 'daily');
            refreshUI();
        };

        window.setSelectedDay = function(day) {
            selectedDay = day;
            refreshUI();
        };

        function populateSelect() {
            const sel = document.getElementById('initialTeacherSelect');
            if (!sel) return;
            const currentVal = sel.value;
            sel.innerHTML = '<option value="">QUEM É VOCÊ?</option>';
            Object.keys(scheduleData).sort().forEach(p => {
                const opt = document.createElement('option');
                opt.value = p;
                opt.textContent = p.toUpperCase();
                sel.appendChild(opt);
            });
            if (currentVal) sel.value = currentVal;
        }

        function refreshUI() {
            if (!currentUser) return;
            
            dayKeys.forEach(dk => {
                const btn = document.getElementById('day-' + dk);
                if (btn) btn.className = dk === selectedDay ? 'flex-1 min-w-[60px] py-4 rounded-2xl text-[9px] font-black day-tab-active transition-all' : 'flex-1 min-w-[60px] py-4 rounded-2xl text-[9px] font-black bg-white/5 text-slate-600 transition-all';
            });

            const content = document.getElementById('scheduleContent');
            if (!content) return;
            content.innerHTML = "";
            viewMode === 'daily' ? renderDaily(content) : renderWeekly(content);
        }

        function renderDaily(container) {
            const dayData = scheduleData[currentUser][selectedDay];
            dayData.forEach((val, i) => {
                const data = parseCell(val);
                const isNow = (selectedDay === getTodayKey() && checkTimeSlot(i));
                const meta = getCellMeta(val);
                
                const card = document.createElement('div');
                card.className = `glass-panel p-5 rounded-[2.5rem] flex items-center gap-6 transition-all editable-cell ${isNow ? 'active-pulse' : ''}`;
                card.onclick = () => openEditModal(selectedDay, i);
                
                card.innerHTML = `
                    <div class="flex flex-col items-center justify-center bg-white/5 px-3 py-3 rounded-2xl min-w-[80px] border border-white/5">
                        <span class="text-[8px] font-black text-slate-500 uppercase tracking-tighter mb-1">${i+1}ª AULA</span>
                        <span class="text-xs font-black ${isNow ? 'text-teal-400' : 'text-white'}">${timeSlots[i]}</span>
                    </div>
                    <div class="flex-1 overflow-hidden">
                        <h4 class="text-xl font-black leading-tight ${meta.text} truncate uppercase tracking-tighter">${data.room}</h4>
                        <div class="flex items-center gap-2 text-[9px] font-bold text-slate-500 uppercase tracking-widest mt-1">
                            <span>${isNow ? '🔥 A DECORRER' : (data.sub ? data.sub : meta.sub)}</span>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function renderWeekly(container) {
            const tableWrap = document.createElement('div');
            tableWrap.className = "bg-slate-900/50 rounded-[2.5rem] border border-white/5 shadow-2xl overflow-hidden overflow-x-auto hide-scrollbar";
            
            let html = `<table class="w-full text-left border-collapse min-w-[700px]">
                <thead><tr class="bg-white/5">
                    <th class="p-5 text-[9px] font-black text-slate-500 uppercase tracking-widest">Hora</th>
                    <th class="p-5 text-[9px] font-black text-slate-300 uppercase tracking-widest">SEG</th>
                    <th class="p-5 text-[9px] font-black text-slate-300 uppercase tracking-widest">TER</th>
                    <th class="p-5 text-[9px] font-black text-slate-300 uppercase tracking-widest">QUA</th>
                    <th class="p-5 text-[9px] font-black text-slate-300 uppercase tracking-widest">QUI</th>
                    <th class="p-5 text-[9px] font-black text-slate-300 uppercase tracking-widest">SEX</th>
                </tr></thead><tbody class="divide-y divide-white/5">`;

            for (let i = 0; i < 9; i++) {
                html += `<tr>
                    <td class="p-5 bg-white/[0.02]">
                        <div class="text-[9px] font-black text-slate-500 leading-none mb-1">${i+1}ª</div>
                        <div class="text-[9px] font-black text-slate-400">${timeSlots[i]}</div>
                    </td>`;
                
                dayKeys.forEach(dk => {
                    const val = scheduleData[currentUser][dk][i];
                    const data = parseCell(val);
                    const meta = getCellMeta(val);
                    const isNow = (dk === getTodayKey() && checkTimeSlot(i));
                    
                    html += `<td class="p-4 ${isNow ? 'bg-teal-400/10' : ''}" onclick="openEditModal('${dk}', ${i})">
                        <div class="text-[12px] font-black ${meta.text} leading-tight uppercase truncate">${data.room}</div>
                        <div class="text-[7px] font-bold text-slate-600 uppercase truncate mt-0.5">${data.sub}</div>
                    </td>`;
                });
                html += `</tr>`;
            }

            html += `</tbody></table>`;
            tableWrap.innerHTML = html;
            container.appendChild(tableWrap);
        }

        function startClock() {
            setInterval(() => {
                const now = new Date();
                const clockEl = document.getElementById('liveClock');
                if (clockEl) {
                    clockEl.textContent = now.toLocaleTimeString('pt-PT', {hour: '2-digit', minute: '2-digit'});
                }
                const dateEl = document.getElementById('todayDateDisplay');
                if (dateEl) {
                    dateEl.textContent = now.toLocaleDateString('pt-PT', { weekday: 'short', day: 'numeric', month: 'short' });
                }
            }, 1000);
        }

        init();
    </script>
