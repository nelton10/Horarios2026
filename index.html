    <style>
        :root {
            --brand-teal: #4a8c95;
            --brand-orange: #d17d5d;
            --primary: #1e40af;
        }
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: #ffffff;
            color: #1e293b;
            -webkit-tap-highlight-color: transparent;
        }
        .active-pulse {
            position: relative;
            border: 2px solid var(--brand-teal) !important;
            transform: scale(1.02);
            z-index: 10;
        }
        .active-pulse::after {
            content: '';
            position: absolute;
            inset: -4px;
            border-radius: 1.5rem;
            border: 2px solid var(--brand-teal);
            animation: pulse-ring 2s infinite;
        }
        @keyframes pulse-ring {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(1.08); opacity: 0; }
        }
        .day-tab-active {
            background: var(--brand-teal);
            color: white;
            box-shadow: 0 10px 15px -3px rgba(74, 140, 149, 0.3);
        }
        .view-toggle-active {
            background: white;
            color: var(--brand-teal);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        .glass-card {
            background: #ffffff;
            border: 1px solid #f1f5f9;
            box-shadow: 0 4px 20px -2px rgba(0, 0, 0, 0.05);
        }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        
        #loadingOverlay {
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(5px);
        }
    </style>
</head>

            "Nelton": {mon:["LEC","LEC-RECOMP.","LEC","LEC-RECOMP.","LEC","LEC-RECOMP.","PLAN","LEC-RECOMP.","PLAN"],tue:["3º B","3º B","PLAN","1º ADM","1º ADM","PLAN (D)","PLAN (D)","PLAN (D)","PLAN (D)"],wed:["DT","DT","DT","PLAN","PLAN","PLAN","PLAN","FOLGA","FOLGA"],thu:["3º A","3º A","PLAN","LEC-RECOMP.","PLAN","1º ADM","1º ADM","FOLGA","FOLGA"],fri:["PLAN","1º ADM","PLAN","3º C","3º C","LEC","LEC","FOLGA","FOLGA"]},
            "Nielsen": {mon:["PLAN (D)","PLAN (D)","PLAN (D)","PLAN (D)","FOLGA","2º C","2º C","PROJ. COMPL.","PLAN"],tue:["2º C","2º C","2º A","1º PAV","1º PAV","2º B","2º B","PLAN","1º A"],wed:["PLAN","PLAN","PLAN","PLAN","PLAN","2º C","2º C","2º A","2º A"],thu:["2º A","1º A","1º ADM","2º B","2º B","FOLGA","FOLGA","FOLGA","FOLGA"],fri:["1º A","1º A","1º ADM","PLAN","PLAN","2º B","2º B","2º C","2º C"]},
            "Rafaela": {mon:["FOLGA","FOLGA","FOLGA","FOLGA","FOLGA","1º PAV","LEI","LEI","LEI"],tue:["FOLGA","FOLGA","FOLGA","FOLGA","FOLGA","LEI","LEI","LEI","LEI"],wed:["FOLGA","FOLGA","FOLGA","FOLGA","FOLGA","1º PAV","1º PAV","LEI","LEI"],thu:["FOLGA","FOLGA","FOLGA","FOLGA","FOLGA","LEI","LEI","LEI","LEI"],fri:["FOLGA","FOLGA","FOLGA","FOLGA","FOLGA","LEI","LEI","LEI","LEI"]},
            "Roberto Andrade": {mon:["FOLGA","FOLGA","FOLGA","FOLGA","FOLGA","PLAN","3º B","3º C","2º A"],tue:["2º A","PLAN","2º B","PROJ. COMPL.","PLAN","3º C","3º C","3º B","3º B"],wed:["2º A","2º A","2º C","2º C","2º B","PLAN (D)","PLAN (D)","PLAN (D)","PLAN (D)"],thu:["PLAN","PLAN","PLAN","PLAN","PLAN","2º B","2º B","3º A","3º A"],fri:["3º B","PLAN","3º C","2º B","2º B","3º A","3º A","2º A","2º A"]},
            "Sâmia": {mon:["FOLGA","3º C","3º C","2º B","2º B","FOLGA","FOLGA","FOLGA","FOLGA"],tue:["PLAN","PLAN","PLAN","PLAN","PLAN","3º B","2º C","2º B","PLAN"],wed:["3º B","DT","DT","DT","3º C","PLAN (D)","PLAN (D)","PLAN (D)","PLAN (D)"],thu:["2º C","PLAN","3º C","3º C","PLAN","PROJ. COMPL.","PROJ. COMPL.", "3º B","3º B"],fri:["3º C","3º C","2º B","2º C","2º C","3º C","PLAN","3º A","3º A"]},
            "Soraia": {mon:["FOLGA","PLAN","2º A","3º C","3º C","FOLGA","FOLGA","FOLGA","FOLGA"],tue:["PLAN","PLAN","PLAN","PLAN","PLAN","3º A","3º B","PLAN","2º C"],wed:["2º B","DT","DT","3º A","3º A","PLAN (D)","PLAN (D)","PLAN (D)","PLAN (D)"],thu:["3º B","3º B","2º A","PLAN","3º A","PLAN","PLAN","2º B","2º C"],fri:["DT","PROJ. COMPL.","3º A","3º A","2º A","2º C","2º C","3º B","3º B"]},
            "Thiago": {mon:["-","-","-","-","-","-","-","-","-"],tue:["-","-","-","-","-","-","-","-","-"],wed:["DT","DT","2º A","2º A","DT","3º B","3º B","3º C","3º C"],thu:["FOLGA","FOLGA","PLAN","PLAN","2º A","PLAN","FOLGA","FOLGA","FOLGA"],fri:["-","-","-","-","-","-","-","-","-"]},
            "Vanessa ESP": {mon:["3º C","PLAN","3º B","FOLGA","FOLGA","FOLGA","FOLGA","FOLGA","FOLGA"],tue:["PCA","PCA","PCA","PCA","PCA","PCA","PCA","PCA","PLAN"],wed:["PLAN (D)","PLAN (D)","PLAN (D)","PLAN (D)","FOLGA","2º B","PLAN","3º A","3º A"],thu:["1º A","2º A","3º B","PLAN","2º C","PCA","PCA","3º C","PLAN"],fri:["1º ADM","PLAN","1º PAV","PLAN","FOLGA","FOLGA","FOLGA","FOLGA","FOLGA"]},
            "Vanessa Lima": {mon:["1º PAV","1º PAV","3º A","3º A","PLAN","FOLGA","FOLGA","FOLGA","FOLGA"],tue:["PLAN","PLAN","PLAN","PLAN","PLAN","FOLGA","FOLGA","FOLGA","FOLGA"],wed:["1º PAV","DT","DT","DT","1º PAV","FOLGA","FOLGA","FOLGA","FOLGA"],thu:["1º PAV","1º PAV","PLAN","1º ADM","PROJ. COMPL.","FOLGA","FOLGA","FOLGA","FOLGA"],fri:["-","-","-","-","-","-","-","-","-"]}
        };

        const dayKeys = ['mon', 'tue', 'wed', 'thu', 'fri'];
        const dayNames = { mon: 'Segunda', tue: 'Terça', wed: 'Quarta', thu: 'Quinta', fri: 'Sexta' };
        const timeSlots = ["07:00", "07:50", "08:40", "09:50", "10:40", "13:00", "13:50", "14:40", "15:45"];
        
        let scheduleData = {};
        let viewMode = 'daily';
        let selectedDay = 'mon';
        let currentUser = null;
        let editingTarget = null;
        let db, auth, user, appId;

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        auth = getAuth(app);
        db = getFirestore(app);
        appId = 'gestao-anisio';

        // Helpers
        const parseCell = (val) => {
            if (!val || val === "-") return { room: "-", sub: "" };
            const parts = val.split(" | ");
            return { room: parts[0] || "-", sub: parts[1] || "" };
        };

        const getTodayKey = () => ['sun', 'mon', 'tue', 'wed', 'thu', 'fri', 'sat'][new Date().getDay()];

        const checkTimeSlot = (idx) => {
            const m = new Date().getHours() * 60 + new Date().getMinutes();
            const slots = [[420, 470], [470, 520], [520, 570], [630, 680], [680, 730], [780, 830], [830, 880], [880, 930], [945, 995]];
            return m >= slots[idx][0] && m < slots[idx][1];
        };

        const getCellMeta = (val) => {
            const room = parseCell(val).room;
            if (!val || val === "-" || room === "FOLGA") return { bg: 'bg-slate-50/40', text: 'text-slate-300', sub: 'Livre' };
            if (val.includes("PLAN")) return { bg: 'bg-emerald-50/50', text: 'text-emerald-700', sub: 'Planeamento' };
            if (val.includes("DT") || val.includes("PCA") || val.includes("PROJ") || val.includes("LEI") || val.includes("LEC")) return { bg: 'bg-amber-50/50', text: 'text-amber-700', sub: 'Especial' };
            return { bg: 'bg-[#4a8c95]/10', text: 'text-[#4a8c95]', sub: 'Aula' };
        };

        // Firebase Auth & Sync
        async function init() {
            startClock();
            const d = new Date().getDay();
            selectedDay = dayKeys[d-1] || 'mon';

            // Fixed Auth logic with fallback
            try {
                // Try custom token if available, else anonymous
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    try {
                        await signInWithCustomToken(auth, __initial_auth_token);
                    } catch (e) {
                        // If mismatch or error, fallback to anonymous
                        await signInAnonymously(auth);
                    }
                } else {
                    await signInAnonymously(auth);
                }
            } catch (err) {
                console.error("Critical Auth failure", err);
            }

            onAuthStateChanged(auth, async (authenticatedUser) => {
                if (!authenticatedUser) return;
                user = authenticatedUser;
                
                // Real-time listener Rule 1
                const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'schedules', 'mainData');
                
                onSnapshot(docRef, (docSnap) => {
                    if (docSnap.exists()) {
                        scheduleData = docSnap.data().content;
                    } else {
                        scheduleData = JSON.parse(JSON.stringify(baseScheduleData));
                        saveToFirebase(scheduleData);
                    }
                    
                    document.getElementById('loadingOverlay').classList.add('opacity-0');
                    setTimeout(() => document.getElementById('loadingOverlay').classList.add('hidden'), 500);
                    
                    populateSelect();
                    checkPersistence();
                    if (currentUser) refreshUI();
                }, (error) => {
                    console.error("Firebase Sync Error:", error);
                    // Load fallback data if Firestore fails
                    scheduleData = JSON.parse(JSON.stringify(baseScheduleData));
                    document.getElementById('loadingOverlay').classList.add('hidden');
                    populateSelect();
                    checkPersistence();
                });
            });
        }

        async function saveToFirebase(data) {
            if (!user) return;
            const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'schedules', 'mainData');
            await setDoc(docRef, { content: data });
        }

        function checkPersistence() {
            const saved = localStorage.getItem('eemti_horario_v8_val');
            if (saved && scheduleData[saved]) {
                currentUser = saved;
                document.getElementById('selectionScreen').classList.add('hidden');
                document.getElementById('app').classList.remove('hidden');
                document.getElementById('currentTeacherDisplay').textContent = "Olá, " + currentUser;
            }
        }

        window.confirmInitialSelection = function() {
            const val = document.getElementById('initialTeacherSelect').value;
            if (!val) return;
            currentUser = val;
            if (document.getElementById('stayConnected').checked) {
                localStorage.setItem('eemti_horario_v8_val', val);
            }
            document.getElementById('selectionScreen').classList.add('hidden');
            document.getElementById('app').classList.remove('hidden');
            document.getElementById('currentTeacherDisplay').textContent = "Olá, " + currentUser;
            refreshUI();
        }

        window.logout = function() {
            localStorage.removeItem('eemti_horario_v8_val');
            location.reload();
        }

        window.openEditModal = function(day, index) {
            editingTarget = { day, index };
            const currentVal = scheduleData[currentUser][day][index];
            const data = parseCell(currentVal);
            
            document.getElementById('modalTitle').textContent = `${dayNames[day]} • ${index+1}ª Aula`;
            document.getElementById('editClassInput').value = data.room === "-" ? "" : data.room;
            document.getElementById('editSubjectInput').value = data.sub;
            
            document.getElementById('editModal').classList.remove('hidden');
            document.getElementById('editClassInput').focus();
        }

        window.closeModal = function() {
            document.getElementById('editModal').classList.add('hidden');
            editingTarget = null;
        }

        window.saveCellEdit = async function() {
            if (!editingTarget) return;
            const room = document.getElementById('editClassInput').value.trim() || "-";
            const sub = document.getElementById('editSubjectInput').value.trim();
            
            const btn = document.getElementById('saveBtn');
            btn.disabled = true;
            btn.textContent = "Salvando...";

            try {
                scheduleData[currentUser][editingTarget.day][editingTarget.index] = sub ? `${room} | ${sub}` : room;
                await saveToFirebase(scheduleData);
                refreshUI();
                closeModal();
            } catch (e) {
                console.error("Save error:", e);
                alert("Erro ao salvar dados na nuvem.");
            } finally {
                btn.disabled = false;
                btn.textContent = "Confirmar Alteração";
            }
        }

        window.changeViewMode = function(mode) {
            viewMode = mode;
            document.getElementById('btnViewDaily').className = mode === 'daily' ? 'flex-1 py-3.5 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all view-toggle-active' : 'flex-1 py-3.5 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all text-slate-400';
            document.getElementById('btnViewWeekly').className = mode === 'weekly' ? 'flex-1 py-3.5 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all view-toggle-active' : 'flex-1 py-3.5 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all text-slate-400';
            
            document.getElementById('daySelector').classList.toggle('hidden', mode === 'weekly');
            document.getElementById('weeklyEditHeader').classList.toggle('hidden', mode === 'daily');
            refreshUI();
        }

        window.setSelectedDay = function(day) {
            selectedDay = day;
            refreshUI();
        }

        function populateSelect() {
            const sel = document.getElementById('initialTeacherSelect');
            if (!sel) return;
            const currentVal = sel.value;
            sel.innerHTML = '<option value="">SELECIONE SEU NOME</option>';
            Object.keys(scheduleData).sort().forEach(p => sel.add(new Option(p, p)));
            if (currentVal) sel.value = currentVal;
        }

        function refreshUI() {
            if (!currentUser) return;
            
            dayKeys.forEach(dk => {
                const btn = document.getElementById('day-' + dk);
                if (btn) btn.className = dk === selectedDay ? 'flex-1 min-w-[60px] py-4 rounded-2xl text-[10px] font-black day-tab-active transition-all' : 'flex-1 min-w-[60px] py-4 rounded-2xl text-[10px] font-black bg-white border border-slate-100 shadow-sm text-slate-400 transition-all';
            });

            const content = document.getElementById('scheduleContent');
            if (!content) return;
            content.innerHTML = "";
            viewMode === 'daily' ? renderDaily(content) : renderWeekly(content);
        }

        function renderDaily(container) {
            const dayData = scheduleData[currentUser][selectedDay];
            dayData.forEach((val, i) => {
                const data = parseCell(val);
                const isNow = (selectedDay === getTodayKey() && checkTimeSlot(i));
                const meta = getCellMeta(val);
                
                const card = document.createElement('div');
                card.className = `glass-card p-6 rounded-[2.5rem] flex items-center gap-6 transition-all ${isNow ? 'active-pulse' : ''}`;
                card.onclick = () => openEditModal(selectedDay, i);
                
                card.innerHTML = `
                    <div class="flex flex-col items-center justify-center bg-blue-50 px-3 py-3 rounded-2xl min-w-[85px] border border-blue-100">
                        <span class="text-[9px] font-black text-blue-400 uppercase tracking-tighter mb-1">${i+1}ª AULA</span>
                        <span class="text-sm font-black text-[#4a8c95]">${timeSlots[i]}</span>
                    </div>
                    <div class="flex-1 overflow-hidden">
                        <h4 class="text-2xl font-black leading-tight ${meta.text} truncate uppercase tracking-tighter">${data.room}</h4>
                        <div class="flex items-center gap-2 text-[10px] font-bold text-slate-400 uppercase tracking-wide mt-1">
                            <span>📍</span>
                            <span class="truncate">${isNow ? 'A DECORRER' : (data.sub ? data.sub : meta.sub)}</span>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function renderWeekly(container) {
            const tableWrap = document.createElement('div');
            tableWrap.className = "bg-white rounded-[2.5rem] border border-slate-100 shadow-xl overflow-hidden overflow-x-auto hide-scrollbar";
            
            let html = `<table class="w-full text-left border-collapse min-w-[700px]">
                <thead><tr class="bg-slate-50/50">
                    <th class="p-5 text-[10px] font-black text-slate-400 uppercase tracking-widest">Hora</th>
                    <th class="p-5 text-[10px] font-black text-slate-700 uppercase">SEG</th>
                    <th class="p-5 text-[10px] font-black text-slate-700 uppercase">TER</th>
                    <th class="p-5 text-[10px] font-black text-slate-700 uppercase">QUA</th>
                    <th class="p-5 text-[10px] font-black text-slate-700 uppercase">QUI</th>
                    <th class="p-5 text-[10px] font-black text-slate-700 uppercase">SEX</th>
                </tr></thead><tbody class="divide-y divide-slate-50">`;

            for (let i = 0; i < 9; i++) {
                html += `<tr>
                    <td class="p-5 bg-slate-50/30">
                        <div class="text-[10px] font-black text-slate-400 leading-none mb-1">${i+1}ª</div>
                        <div class="text-[10px] font-black text-slate-600">${timeSlots[i]}</div>
                    </td>`;
                
                dayKeys.forEach(dk => {
                    const val = scheduleData[currentUser][dk][i];
                    const data = parseCell(val);
                    const meta = getCellMeta(val);
                    const isNow = (dk === getTodayKey() && checkTimeSlot(i));
                    
                    html += `<td class="p-4 ${meta.bg} ${isNow ? 'ring-2 ring-[#4a8c95] ring-inset z-10' : ''}" onclick="openEditModal('${dk}', ${i})">
                        <div class="text-[13px] font-black ${meta.text} leading-tight uppercase truncate">${data.room}</div>
                        <div class="text-[8px] font-bold text-slate-400 uppercase truncate mt-0.5">${data.sub}</div>
                    </td>`;
                });
                html += `</tr>`;
            }

            html += `</tbody></table>`;
            tableWrap.innerHTML = html;
            container.appendChild(tableWrap);
        }

        function startClock() {
            setInterval(() => {
                const now = new Date();
                const clockEl = document.getElementById('liveClock');
                if (clockEl) {
                    clockEl.textContent = now.toLocaleTimeString('pt-PT', {hour: '2-digit', minute: '2-digit'});
                }
                const dateEl = document.getElementById('todayDateDisplay');
                if (dateEl) {
                    dateEl.textContent = now.toLocaleDateString('pt-PT', { weekday: 'short', day: 'numeric', month: 'short' });
                }
            }, 1000);
        }

        init();
    </script>
</body>
</html>
