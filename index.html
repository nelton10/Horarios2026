    <style>
        :root {
            --brand-teal: #2dd4bf;
            --brand-orange: #fb923c;
            --bg-dark: #020617;
            --card-dark: #0f172a;
        }
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: linear-gradient(180deg, #020617 0%, #0f172a 100%);
            color: #f8fafc;
            min-height: 100vh;
            -webkit-tap-highlight-color: transparent;
        }
        .glass-panel {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
        }
        .active-pulse {
            position: relative;
            background: linear-gradient(90deg, rgba(45, 212, 191, 0.15), rgba(45, 212, 191, 0.05)) !important;
            border: 1px solid var(--brand-teal) !important;
            box-shadow: 0 0 20px rgba(45, 212, 191, 0.2);
            z-index: 10;
        }
        .active-pulse::after {
            content: '';
            position: absolute;
            inset: -4px;
            border-radius: 2rem;
            border: 2px solid var(--brand-teal);
            animation: pulse-ring 2s infinite;
        }
        @keyframes pulse-ring {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(1.08); opacity: 0; }
        }
        .day-tab-active {
            background: #ffffff;
            color: #020617;
            font-weight: 800;
            transform: scale(1.05);
        }
        .view-toggle-active {
            background: rgba(255, 255, 255, 0.1);
            color: #ffffff;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        
        #loadingOverlay { background: #020617; }
        
        #initialTeacherSelect {
            background-color: #0f172a;
            color: white;
            border: 2px solid rgba(255, 255, 255, 0.1);
            text-align-last: center;
        }
    </style>
</head>

    <div id="loadingOverlay" class="fixed inset-0 z-[100] flex flex-col items-center justify-center transition-opacity duration-700">

            <div class="w-20 h-20 border-2 border-white/5 border-t-teal-400 rounded-full animate-spin"></div>
            <div class="absolute text-[10px] font-black text-teal-400 animate-pulse uppercase tracking-widest">AT</div>
        </div>
        <p class="mt-6 text-[10px] font-bold text-slate-500 uppercase tracking-[0.4em]">Sincronizando...</p>

            <h1 class="text-xs font-black text-slate-500 tracking-[0.4em] uppercase mb-1">Escola</h1>

            <div class="w-full space-y-6">

        </div>
    </div>

            "Nielsen": {mon:["PLAN (D)","PLAN (D)","PLAN (D)","PLAN (D)","FOLGA","2º C","2º C","PROJ. COMPL.","PLAN"],tue:["2º C","2º C","2º A","1º PAV","1º PAV","2º B","2º B","PLAN","1º A"],wed:["PLAN","PLAN","PLAN","PLAN","PLAN","2º C","2º C","2º A","2º A"],thu:["2º A","1º A","1º ADM","2º B","2º B","FOLGA","FOLGA","FOLGA","FOLGA"],fri:["1º A","1º A","1º ADM","PLAN","PLAN","2º B","2º B","2º C","2º C"]},
            "Rafaela": {mon:["FOLGA","FOLGA","FOLGA","FOLGA","FOLGA","1º PAV","LEI","LEI","LEI"],tue:["FOLGA","FOLGA","FOLGA","FOLGA","FOLGA","LEI","LEI","LEI","LEI"],wed:["FOLGA","FOLGA","FOLGA","FOLGA","FOLGA","1º PAV","1º PAV","LEI","LEI"],thu:["FOLGA","FOLGA","FOLGA","FOLGA","FOLGA","LEI","LEI","LEI","LEI"],fri:["FOLGA","FOLGA","FOLGA","FOLGA","FOLGA","LEI","LEI","LEI","LEI"]},
            "Roberto Andrade": {mon:["FOLGA","FOLGA","FOLGA","FOLGA","FOLGA","PLAN","3º B","3º C","2º A"],tue:["2º A","PLAN","2º B","PROJ. COMPL.","PLAN","3º C","3º C","3º B","3º B"],wed:["2º A","2º A","2º C","2º C","2º B","PLAN (D)","PLAN (D)","PLAN (D)","PLAN (D)"],thu:["PLAN","PLAN","PLAN","PLAN","PLAN","2º B","2º B","3º A","3º A"],fri:["3º B","PLAN","3º C","2º B","2º B","3º A","3º A","2º A","2º A"]},
            "Sâmia": {mon:["FOLGA","3º C","3º C","2º B","2º B","FOLGA","FOLGA","FOLGA","FOLGA"],tue:["PLAN","PLAN","PLAN","PLAN","PLAN","3º B","2º C","2º B","PLAN"],wed:["3º B","DT","DT","DT","3º C","PLAN (D)","PLAN (D)","PLAN (D)","PLAN (D)"],thu:["2º C","PLAN","3º C","3º C","PLAN","PROJ. COMPL.","PROJ. COMPL.", "3º B","3º B"],fri:["3º C","3º C","2º B","2º C","2º C","3º C","PLAN","3º A","3º A"]},
            "Soraia": {mon:["FOLGA","PLAN","2º A","3º C","3º C","FOLGA","FOLGA","FOLGA","FOLGA"],tue:["PLAN","PLAN","PLAN","PLAN","PLAN","3º A","3º B","PLAN","2º C"],wed:["2º B","DT","DT","3º A","3º A","PLAN (D)","PLAN (D)","PLAN (D)","PLAN (D)"],thu:["3º B","3º B","2º A","PLAN","3º A","PLAN","PLAN","2º B","2º C"],fri:["DT","PROJ. COMPL.","3º A","3º A","2º A","2º C","2º C","3º B","3º B"]},
            "Thiago": {mon:["-","-","-","-","-","-","-","-","-"],tue:["-","-","-","-","-","-","-","-","-"],wed:["DT","DT","2º A","2º A","DT","3º B","3º B","3º C","3º C"],thu:["FOLGA","FOLGA","PLAN","PLAN","2º A","PLAN","FOLGA","FOLGA","FOLGA"],fri:["-","-","-","-","-","-","-","-","-"]},
            "Vanessa ESP": {mon:["3º C","PLAN","3º B","FOLGA","FOLGA","FOLGA","FOLGA","FOLGA","FOLGA"],tue:["PCA","PCA","PCA","PCA","PCA","PCA","PCA","PCA","PLAN"],wed:["PLAN (D)","PLAN (D)","PLAN (D)","PLAN (D)","FOLGA","2º B","PLAN","3º A","3º A"],thu:["1º A","2º A","3º B","PLAN","2º C","PCA","PCA","3º C","PLAN"],fri:["1º ADM","PLAN","1º PAV","PLAN","FOLGA","FOLGA","FOLGA","FOLGA","FOLGA"]},
            "Vanessa Lima": {mon:["1º PAV","1º PAV","3º A","3º A","PLAN","FOLGA","FOLGA","FOLGA","FOLGA"],tue:["PLAN","PLAN","PLAN","PLAN","PLAN","FOLGA","FOLGA","FOLGA","FOLGA"],wed:["1º PAV","DT","DT","DT","1º PAV","FOLGA","FOLGA","FOLGA","FOLGA"],thu:["1º PAV","1º PAV","PLAN","1º ADM","PROJ. COMPL.","FOLGA","FOLGA","FOLGA","FOLGA"],fri:["-","-","-","-","-","-","-","-","-"]}
        };

        const dayKeys = ['mon', 'tue', 'wed', 'thu', 'fri'];
        const dayNames = { mon: 'Segunda', tue: 'Terça', wed: 'Quarta', thu: 'Quinta', fri: 'Sexta' };
        const timeSlots = ["07:10", "08:00", "08:50", "10:00", "10:50", "13:00", "13:50", "15:00", "15:50"];
        
        let scheduleData = {};
        let viewMode = 'daily';
        let selectedDay = 'mon';
        let currentUser = null;
        let db, auth, user;

        const fApp = initializeApp(firebaseConfig);
        auth = getAuth(fApp);
        db = getFirestore(fApp);

        const parseCell = (val) => {
            if (!val || val === "-") return { room: "-", sub: "" };
            const parts = val.split(" | ");
            return { room: parts[0] || "-", sub: parts[1] || "" };
        };

        const getTodayKey = () => ['sun', 'mon', 'tue', 'wed', 'thu', 'fri', 'sat'][new Date().getDay()];

        const checkTimeSlot = (idx) => {
            const now = new Date();
            const m = now.getHours() * 60 + now.getMinutes();
            const activeSlots = [
                [430, 480], [480, 530], [530, 580], [600, 650], [650, 700], 
                [780, 830], [830, 880], [900, 950], [950, 1000]
            ];
            return m >= activeSlots[idx][0] && m < activeSlots[idx][1];
        };

        const getCellMeta = (val) => {
            const room = parseCell(val).room;
            if (!val || val === "-" || room === "FOLGA") return { bg: 'bg-slate-800/20', text: 'text-slate-600' };
            if (val.includes("PLAN")) return { bg: 'bg-teal-500/5', text: 'text-teal-400' };
            if (val.includes("DT") || val.includes("PCA") || val.includes("PROJ")) return { bg: 'bg-orange-500/5', text: 'text-orange-400' };
            return { bg: 'bg-blue-500/5', text: 'text-blue-400' };
        };

        // PWA Install
        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            const btn = document.getElementById('installBtn');
            if (btn) btn.classList.remove('hidden');
        });

        async function init() {
            startClock();
            const d = new Date().getDay();
            selectedDay = dayKeys[d-1] || 'mon';

            const installBtn = document.getElementById('installBtn');
            if(installBtn) installBtn.addEventListener('click', async () => {
                if (deferredPrompt) {
                    deferredPrompt.prompt();
                    const { outcome } = await deferredPrompt.userChoice;
                    if (outcome === 'accepted') deferredPrompt = null;
                } else {
                    alert("Para instalar:\nNo Android: Opções > Instalar App.\nNo iPhone: Partilhar > Adicionar ao Ecrã Principal.");
                }
            });

            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token).catch(() => signInAnonymously(auth));
                } else {
                    await signInAnonymously(auth);
                }
            } catch (err) { console.error(err); }

            onAuthStateChanged(auth, async (authenticatedUser) => {
                if (!authenticatedUser) return;
                user = authenticatedUser;
                const docRef = doc(db, 'artifacts', 'gestao-anisio', 'public', 'data', 'schedules', 'mainData');
                
                onSnapshot(docRef, (docSnap) => {
                    scheduleData = docSnap.exists() ? docSnap.data().content : JSON.parse(JSON.stringify(baseScheduleData));
                    if (!docSnap.exists()) setDoc(docRef, { content: scheduleData });
                    
                    const loader = document.getElementById('loadingOverlay');
                    if(loader) {
                        loader.classList.add('opacity-0');
                        setTimeout(() => loader.classList.add('hidden'), 700);
                    }
                    
                    populateSelect();
                    checkPersistence();
                    if (currentUser) refreshUI();
                });
            });
        }

        function checkPersistence() {
            const saved = localStorage.getItem('eemti_horario_v9_val');
            if (saved && scheduleData[saved]) {
                currentUser = saved;
                document.getElementById('selectionScreen').classList.add('hidden');
                document.getElementById('app').classList.remove('hidden');
                document.getElementById('currentTeacherDisplay').textContent = "Olá, " + currentUser;
            }
        }

        window.confirmInitialSelection = function() {
            const val = document.getElementById('initialTeacherSelect').value;
            if (!val) return;
            currentUser = val;
            if (document.getElementById('stayConnected').checked) localStorage.setItem('eemti_horario_v9_val', val);
            document.getElementById('selectionScreen').classList.add('hidden');
            document.getElementById('app').classList.remove('hidden');
            document.getElementById('currentTeacherDisplay').textContent = "Olá, " + currentUser;
            refreshUI();
        };

        window.logout = function() {
            localStorage.removeItem('eemti_horario_v9_val');
            location.reload();
        };

        window.openEditModal = function(day, index) {
            const currentVal = scheduleData[currentUser][day][index];
            const data = parseCell(currentVal);
            const room = prompt(`Turma / Local:`, data.room === "-" ? "" : data.room);
            if (room === null) return;
            const sub = prompt(`Matéria:`, data.sub);
            if (sub === null) return;
            
            scheduleData[currentUser][day][index] = sub ? `${room} | ${sub}` : room;
            setDoc(doc(db, 'artifacts', 'gestao-anisio', 'public', 'data', 'schedules', 'mainData'), { content: scheduleData });
            refreshUI();
        };

        // Função Global para Baixar PDF
        window.downloadPDF = function() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF('landscape');
            
            const title = `Grade de Horarios 2026 - ${currentUser}`;
            doc.setFontSize(18);
            doc.text(title, 14, 15);
            doc.setFontSize(10);
            doc.text("EEMTI Anisio Teixeira", 14, 22);

            const tableData = [];
            for (let i = 0; i < 9; i++) {
                const row = [timeSlots[i]];
                dayKeys.forEach(dk => {
                    const val = scheduleData[currentUser][dk][i];
                    const data = parseCell(val);
                    row.push(data.sub ? `${data.room}\n(${data.sub})` : data.room);
                });
                tableData.push(row);
            }

            doc.autoTable({
                head: [['Hora', 'Segunda', 'Terca', 'Quarta', 'Quinta', 'Sexta']],
                body: tableData,
                startY: 28,
                theme: 'grid',
                styles: { fontSize: 8, cellPadding: 3 },
                headStyles: { fillStyle: '#1e40af', textColor: 255 },
                columnStyles: { 0: { fontStyle: 'bold', width: 25 } }
            });

            doc.save(`Horario_2026_${currentUser.replace(/ /g, '_')}.pdf`);
        };

        window.changeViewMode = function(mode) {
            viewMode = mode;
            const dBtn = document.getElementById('btnViewDaily');
            const wBtn = document.getElementById('btnViewWeekly');
            if(dBtn) dBtn.className = mode === 'daily' ? 'flex-1 py-3 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all view-toggle-active shadow-sm' : 'flex-1 py-3 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all text-slate-600';
            if(wBtn) wBtn.className = mode === 'weekly' ? 'flex-1 py-3 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all view-toggle-active shadow-sm' : 'flex-1 py-3 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all text-slate-600';
            
            const ds = document.getElementById('daySelector');
            const wh = document.getElementById('weeklyEditHeader');
            if(ds) ds.classList.toggle('hidden', mode === 'weekly');
            if(wh) wh.classList.toggle('hidden', mode === 'daily');
            refreshUI();
        };

        window.setSelectedDay = function(day) {
            selectedDay = day;
            refreshUI();
        };

        function populateSelect() {
            const sel = document.getElementById('initialTeacherSelect');
            if (!sel) return;
            const currentVal = sel.value;
            sel.innerHTML = '<option value="">QUEM É VOCÊ?</option>';
            Object.keys(scheduleData).sort().forEach(p => {
                const opt = document.createElement('option');
                opt.value = p; opt.textContent = p.toUpperCase();
                sel.appendChild(opt);
            });
            if (currentVal) sel.value = currentVal;
        }

        function refreshUI() {
            if (!currentUser) return;
            dayKeys.forEach(dk => {
                const btn = document.getElementById('day-' + dk);
                if (btn) btn.className = dk === selectedDay ? 'flex-1 min-w-[60px] py-4 rounded-2xl text-[9px] font-black day-tab-active transition-all' : 'flex-1 min-w-[60px] py-4 rounded-2xl text-[9px] font-black bg-white/5 text-slate-600 transition-all';
            });
            const content = document.getElementById('scheduleContent');
            if (!content) return;
            content.innerHTML = "";
            viewMode === 'daily' ? renderDaily(content) : renderWeekly(content);
        }

        function renderDaily(container) {
            const dayData = scheduleData[currentUser][selectedDay];
            dayData.forEach((val, i) => {
                const data = parseCell(val);
                const isNow = (selectedDay === getTodayKey() && checkTimeSlot(i));
                const meta = getCellMeta(val);
                const card = document.createElement('div');
                card.className = `glass-panel p-5 rounded-[2.5rem] flex items-center gap-6 transition-all ${isNow ? 'active-pulse' : ''}`;
                card.onclick = () => openEditModal(selectedDay, i);
                card.innerHTML = `
                    <div class="flex flex-col items-center justify-center bg-white/5 px-3 py-3 rounded-2xl min-w-[80px] border border-white/5">
                        <span class="text-[8px] font-black text-slate-500 mb-1">${i+1}ª AULA</span>
                        <span class="text-xs font-black ${isNow ? 'text-teal-400' : 'text-white'}">${timeSlots[i]}</span>
                    </div>
                    <div class="flex-1 overflow-hidden">
                        <h4 class="text-xl font-black ${meta.text} truncate uppercase tracking-tighter">${data.room}</h4>
                        <div class="flex items-center gap-2 text-[9px] font-bold text-slate-500 uppercase tracking-widest mt-1">
                            <span>${isNow ? '📍 A DECORRER' : (data.sub ? data.sub : 'Livre')}</span>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function renderWeekly(container) {
            const tableWrap = document.createElement('div');
            tableWrap.className = "bg-slate-900/50 rounded-[2.5rem] border border-white/5 shadow-2xl overflow-hidden overflow-x-auto hide-scrollbar";
            let html = `<table class="w-full text-left border-collapse min-w-[700px]"><thead><tr class="bg-white/5">
                <th class="p-5 text-[9px] font-black text-slate-500 uppercase">Hora</th>
                ${dayKeys.map(dk => `<th class="p-5 text-[9px] font-black text-slate-300 uppercase">${dk.toUpperCase()}</th>`).join('')}
                </tr></thead><tbody class="divide-y divide-white/5">`;
            for (let i = 0; i < 9; i++) {
                html += `<tr><td class="p-5 bg-white/[0.02] text-[9px] font-black text-slate-400">
                    <div class="mb-1">${i+1}ª</div><div>${timeSlots[i]}</div></td>`;
                dayKeys.forEach(dk => {
                    const val = scheduleData[currentUser][dk][i];
                    const data = parseCell(val);
                    const isNow = (dk === getTodayKey() && checkTimeSlot(i));
                    html += `<td class="p-4 ${isNow ? 'bg-teal-400/10' : ''}" onclick="openEditModal('${dk}', ${i})">
                        <div class="text-[12px] font-black ${getCellMeta(val).text} uppercase truncate">${data.room}</div>
                        <div class="text-[7px] font-bold text-slate-600 truncate uppercase mt-0.5">${data.sub}</div>
                    </td>`;
                });
                html += `</tr>`;
            }
            tableWrap.innerHTML = html + `</tbody></table>`;
            container.appendChild(tableWrap);
        }

        function startClock() {
            setInterval(() => {
                const now = new Date();
                const clk = document.getElementById('liveClock');
                if(clk) clk.textContent = now.toLocaleTimeString('pt-PT', {hour: '2-digit', minute: '2-digit'});
                const dte = document.getElementById('todayDateDisplay');
                if(dte) dte.textContent = now.toLocaleDateString('pt-PT', { weekday: 'short', day: 'numeric', month: 'short' });
            }, 1000);
        }

        init();
    </script>
</body>
</html>
